<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="free_open_onean">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- MapLibre GL JS -->
  <link href='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css' rel='stylesheet' />
  <script src='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js'></script>

  <title>FreeOpenOcean</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a2332;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #1a2332;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    #loading .spinner {
      width: 80px;
      height: 80px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4fc3f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #loading .spinner .icon {
      font-size: 45px;
      color: #4fc3f7;
      animation: anti-spin 1s linear infinite;
    }
    #loading .loading {
      margin-top: 24px;
      margin-bottom: 15px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 100;
      color: #b0bec5;
    }
    #loading .title {
      margin-top: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 30px;
      font-weight: 300;
      color: #b0bec5;
      letter-spacing: 2px;
    }
    #loading .sub-title {
      margin-top: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #b0bec5;

    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes anti-spin {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner">
      <span class="icon">⛵</span>
    </div>
    <div class="loading">Loading ...</div>
    <div class="title">FreeOpenOcean.com</div>
    <div class="sub-title">Modern Ocean Charting and Weather App</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
</body>
</html>
